<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KNEURALABS · Policy Handbook</title>
    <style>
        /* ---------- ULTRA MINIMALIST RESET — Google Inter + SF Pro ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', system-ui, sans-serif;
            background: #FFFFFF;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            line-height: 1.45;
        }

        /* ---------- LANDING PAGE (MAGIC WORD) — full viewport, centered, mobile first ---------- */
        .landing-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #F7F5F0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            padding: 1.5rem;
        }

        .landing-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .landing-card {
            max-width: 520px;
            width: 100%;
            text-align: center;
            padding: 1rem;
        }

        .main-title {
            font-size: clamp(2.4rem, 10vw, 4.5rem);
            font-weight: 620;
            letter-spacing: -0.02em;
            color: #0D1B2A;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .version-text {
            font-size: 0.8rem;
            font-weight: 400;
            color: #3D5166;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 2.5rem;
            border-top: 1px solid rgba(0,0,0,0.08);
            display: inline-block;
            padding-top: 0.8rem;
        }

        .magic-form {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .magic-field {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid #BCC4CE;
            padding: 0.75rem 0.3rem;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            color: #0D1B2A;
            transition: border 0.15s;
            text-align: center;
        }

        .magic-field:focus {
            border-bottom-color: #0D1B2A;
        }

        .magic-field::placeholder {
            color: #8E9EAF;
            font-weight: 350;
            text-align: center;
        }

        .magic-btn {
            background: transparent;
            border: 1px solid #0D1B2A;
            padding: 0.7rem 0.8rem;
            font-size: 0.9rem;
            font-weight: 520;
            font-family: inherit;
            cursor: pointer;
            color: #0D1B2A;
            margin-top: 0.2rem;
            transition: 0.1s;
            width: 100%;
        }

        .magic-btn:hover {
            background: rgba(13, 27, 42, 0.04);
        }

        .error-msg {
            font-size: 0.75rem;
            color: #C5062A;
            margin-top: 0.6rem;
            min-height: 1.5rem;
            letter-spacing: 0.2px;
        }

        /* ---------- POLICY WIKI (appears after magic word) ---------- */
        .wiki-app {
            display: none;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        .wiki-app.active {
            display: flex;
            flex-direction: row;
        }

        /* SIDEBAR – neutral, safe zones, mobile optimized */
        .wiki-sidebar {
            width: 280px;
            background: #F7F5F0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .sidebar-header {
            padding: 2rem 1.5rem 1rem 1.8rem;
        }

        .sidebar-header h1 {
            font-size: 1.9rem;
            font-weight: 620;
            letter-spacing: -0.01em;
            color: #0D1B2A;
            margin-bottom: 0.3rem;
        }

        .sidebar-header p {
            font-size: 0.7rem;
            font-weight: 400;
            color: #3D5166;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-area {
            padding: 0.6rem 1.5rem 0.2rem 1.8rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #CFD8E3;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.65rem 0;
            font-size: 0.9rem;
            font-weight: 400;
            outline: none;
            font-family: inherit;
            color: #111;
        }

        .search-box input::placeholder {
            color: #8E9EAF;
        }

        .search-box button {
            background: none;
            border: none;
            font-size: 0.75rem;
            font-weight: 520;
            color: #1A5F7A;
            cursor: pointer;
            padding: 0.4rem 0.2rem 0.4rem 0.9rem;
            font-family: inherit;
        }

        .reset-link {
            font-size: 0.65rem;
            color: #6C7E91;
            cursor: pointer;
            text-decoration: underline;
            display: inline-block;
            margin-top: 8px;
            text-align: right;
        }

        .nav-menu {
            flex: 1;
            padding: 1.2rem 0.6rem 0.8rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .nav-item {
            padding: 0.6rem 0.2rem;
            font-size: 0.95rem;
            font-weight: 450;
            color: #1E2F3E;
            cursor: pointer;
            transition: 0.1s ease;
            letter-spacing: -0.2px;
            border-left: 2px solid transparent;
        }

        .nav-item:hover {
            color: #0A2F44;
            font-weight: 520;
        }

        .nav-item.active {
            font-weight: 650;
            color: #0D1B2A;
            border-left: 2px solid #0D1B2A;
            padding-left: 0.9rem;
        }

        .nav-item.disabled {
            opacity: 0.32;
            pointer-events: none;
            cursor: default;
        }

        .sidebar-ack-link {
            padding: 1rem 1.5rem 0.6rem 1.8rem;
            margin-top: auto;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .ack-link {
            font-size: 0.8rem;
            font-weight: 480;
            color: #0D1B2A;
            text-decoration: underline;
            cursor: pointer;
        }

        .sidebar-footer {
            padding: 0.8rem 1.5rem 1.2rem 1.8rem;
            font-size: 0.62rem;
            color: #6C7E91;
            text-align: left;
        }

        /* MAIN CONTENT – dynamic backgrounds */
        .wiki-main {
            flex: 1;
            overflow-y: auto;
            transition: background-color 0.2s ease, color 0.2s ease;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .policy-view {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.8rem 4rem 1.8rem;
        }

        .policy-title {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.6rem;
        }

        .policy-id {
            font-size: 0.75rem;
            font-weight: 470;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            opacity: 0.7;
            display: inline-block;
            margin-bottom: 1.6rem;
        }

        .policy-section-block p {
            font-size: 1rem;
            line-height: 1.55;
            margin: 0.8rem 0;
        }

        /* EXTRA GAPS BETWEEN BULLET POINTS — increased */
        .policy-section-block ul {
            margin: 1.2rem 0 1.5rem 1.4rem;
            list-style-type: disc;
        }

        .policy-section-block li {
            margin: 1.1rem 0;
            line-height: 1.55;
            font-size: 0.98rem;
        }

        .plain-note {
            margin: 1.4rem 0;
            font-size: 0.95rem;
            border-left: 2px solid currentColor;
            padding-left: 1.2rem;
            opacity: 0.88;
        }

        .vendor-note {
            margin: 1.6rem 0;
            font-size: 0.9rem;
            padding: 0.6rem 0 0.3rem 0;
            border-top: 1px solid rgba(0,0,0,0.1);
            font-weight: 450;
        }

        .footnote {
            font-size: 0.7rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0,0,0,0.1);
            opacity: 0.7;
        }

        .no-results {
            text-align: left;
            font-size: 1rem;
            padding: 2rem 0;
        }

        .back2top {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(5px);
            color: white;
            border: none;
            font-size: 0.7rem;
            padding: 0.45rem 0.9rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 460;
            z-index: 99;
            border-radius: 40px;
        }

        /* MOBILE OPTIMIZATIONS */
        .menu-toggle {
            display: none;
        }

        @media (max-width: 780px) {
            .wiki-app.active {
                flex-direction: column;
            }
            .wiki-sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                transition: left 0.2s ease;
                z-index: 100;
                background: #F7F5F0;
                width: 280px;
                box-shadow: none;
            }
            .wiki-sidebar.mobile-open {
                left: 0;
                box-shadow: 2px 0 20px rgba(0,0,0,0.1);
            }
            .menu-toggle {
                display: block;
                position: fixed;
                bottom: 1.2rem;
                left: 1rem;
                background: #0D1B2A;
                color: white;
                border: none;
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
                font-weight: 500;
                z-index: 102;
                cursor: pointer;
                border-radius: 40px;
            }
            .policy-view {
                padding: 1.5rem 1.2rem 3rem 1.2rem;
            }
            .policy-section-block li {
                margin: 1rem 0;
            }
            .sidebar-header h1 {
                font-size: 1.7rem;
            }
        }

        /* extra small devices */
        @media (max-width: 480px) {
            .magic-field {
                font-size: 0.95rem;
                padding: 0.7rem 0.2rem;
            }
            .policy-title {
                font-size: 1.9rem;
            }
        }
    </style>
</head>
<body>

<!-- LANDING PAGE: SINGLE MAGIC WORD FIELD -->
<div class="landing-container" id="landingContainer">
    <div class="landing-card">
        <div class="main-title">KNEURALABS<br>Policy Handbook</div>
        <div class="version-text">Version 2.0 · April 2026</div>
        <div class="magic-form" id="magicForm">
            <input type="text" id="magicWord" class="magic-field" placeholder="magic word" autocomplete="off" spellcheck="false">
            <button type="button" id="magicBtn" class="magic-btn">Enter</button>
            <div class="error-msg" id="magicError"></div>
        </div>
    </div>
</div>

<!-- POLICY WIKI (hidden until correct magic word) -->
<div class="wiki-app" id="wikiApp">
    <div class="wiki-sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>KNEURALABS</h1>
            <p>policy handbook</p>
        </div>
        <div class="search-area">
            <div class="search-box">
                <input type="text" id="sidebarSearch" placeholder="Search policies" aria-label="Search policies">
                <button id="searchSidebarBtn" aria-label="Go search">Go</button>
            </div>
            <div style="text-align:right;"><span id="clearSearch" class="reset-link" role="button" tabindex="0">clear</span></div>
        </div>
        <div class="nav-menu" id="navMenu">
            <div class="nav-item" data-policy="overview">Overview</div>
            <div class="nav-item" data-policy="hr">HR & People</div>
            <div class="nav-item" data-policy="finance">Finance</div>
            <div class="nav-item" data-policy="it">IT & Security</div>
            <div class="nav-item" data-policy="legal">Legal & AI Rules</div>
            <div class="nav-item" data-policy="conduct">Workplace Conduct</div>
            <div class="nav-item" data-policy="safety">Safe Workplace</div>
            <div class="nav-item" data-policy="workplace">Workplace & IT Rules</div>
            <div class="nav-item" data-policy="privacy">Data Privacy</div>
            <div class="nav-item" data-policy="acknowledge">Acknowledge</div>
        </div>
        <div class="sidebar-ack-link">
            <span id="sidebarAcknowledgeLink" class="ack-link" role="link" tabindex="0">Acknowledge policies</span>
        </div>
        <div class="sidebar-footer">
            <span>Confidential · v2.0</span>
        </div>
    </div>
    <div class="wiki-main" id="mainContent">
        <div class="policy-view" id="policyView"></div>
    </div>
    <button class="menu-toggle" id="mobileMenuToggle" aria-label="Menu">Menu</button>
    <button class="back2top" id="backToTop" aria-label="Back to top">Top</button>
</div>

<script>
    // ------------------- BACKGROUND COLORS PER SECTION (from given palette) ------------------
    const sectionColors = {
        overview:   "#0D1B2A",   
        hr:         "#E8604C",   
        finance:    "#1A7B8C",   
        it:         "#3D5166",   
        legal:      "#F7F5F0",   
        conduct:    "#FFFFFF",   
        safety:     "#468DA3",   
        workplace:  "#C5062A",   
        privacy:    "#0A98D9",   
        acknowledge:"#0A7A50"    
    };
    
    function getTextColor(hex) {
        let r, g, b;
        if (hex.startsWith('#')) {
            r = parseInt(hex.slice(1,3), 16);
            g = parseInt(hex.slice(3,5), 16);
            b = parseInt(hex.slice(5,7), 16);
        } else return "#111111";
        const luminance = (0.299 * r + 0.587 * g + 0.114 * b);
        return luminance > 170 ? "#111111" : "#FEFEF7";
    }
    
    // ---------- PLAIN-LANGUAGE POLICY CONTENT (extra bullet gaps, no jargon) ----------
    const policies = {
        overview: `
            <div>
                <div class="policy-title">KNEURALABS Policies</div>
                <div class="policy-id">KNL-000</div>
                <div class="policy-section-block">
                    <p>We help companies use AI responsibly. These rules apply to everyone: employees, contractors, and partners.</p>
                    <div class="plain-note"><strong>What you must do:</strong> Read and follow these rules. Ask your manager or the CEO if something is unclear.</div>
                    <ul>
                        <li><strong>Who is in charge:</strong> Piyal Gupta (CEO) and Piyali Dhar (Managing Director).</li>
                        <li><strong>Updates:</strong> We review these rules every year. Next update: April 1, 2026.</li>
                        <li><strong>Outside helpers:</strong> Any vendor or freelancer must follow the same rules as our employees.</li>
                        <li><strong>Breaking rules:</strong> If you don't follow these rules, you may face discipline, lose your contract, or face legal action. Report problems to our legal team.</li>
                    </ul>
                    <div class="vendor-note">If you see something wrong, speak up. We protect people who report in good faith.</div>
                </div>
            </div>
        `,
        hr: `
            <div>
                <div class="policy-title">HR & People Rules</div>
                <div class="policy-id">KNL-HR-001</div>
                <div class="policy-section-block">
                    <ul>
                        <li><strong>Hiring:</strong> We choose people based on skill and fit. We run background checks and you must sign agreements about keeping secrets, owning your work, and using AI ethically.</li>
                        <li><strong>Training:</strong> Within your first 5 days, finish training on AI safety and protecting private information.</li>
                        <li><strong>Using AI tools:</strong> Only use AI tools that the company approves. Never paste client data into public AI like ChatGPT. Always double-check AI results.</li>
                        <li><strong>How to act:</strong> Be honest, protect data, and tell your manager if you have a personal conflict with a client or project.</li>
                        <li><strong>Leaving the company:</strong> Return all laptops, phones, and badges. Your access will be turned off within 24 hours. Your duty to keep secrets never ends.</li>
                    </ul>
                    <div class="vendor-note">Our HR partner must keep security certificates, send monthly reports, and tell us within 24 hours if any data breach happens.</div>
                </div>
            </div>
        `,
        finance: `
            <div>
                <div class="policy-title">Finance & Expenses</div>
                <div class="policy-id">KNL-FIN-001</div>
                <div class="policy-section-block">
                    <ul>
                        <li><strong>Getting approvals:</strong> Spend up to $500 → ask CEO or MD. $500 to $5,000 → same with a short note. $5k–$25k → both CEO and MD must agree. Over $25k → both must agree and write a reason.</li>
                        <li><strong>Sending invoices:</strong> Send your invoice within 5 days after finishing work. Payment is due in 30 days. Include the contract or purchase order number.</li>
                        <li><strong>Expense claims:</strong> Submit receipts within 15 days. We don't pay for personal items or expensive entertainment over $150.</li>
                        <li><strong>Fraud:</strong> If you suspect someone is cheating or stealing, tell the CEO or MD immediately. The law protects whistleblowers.</li>
                    </ul>
                    <div class="vendor-note">Our finance partner keeps audit logs, provides monthly financial reports by the 10th, and stores records for 7 years.</div>
                </div>
            </div>
        `,
        it: `
            <div>
                <div class="policy-title">IT & Security</div>
                <div class="policy-id">KNL-IT-001</div>
                <div class="policy-section-block">
                    <ul>
                        <li><strong>Types of data:</strong> "Restricted" means client personal information, passwords, secrets → always encrypt, use multi‑factor authentication, never feed into AI. "Confidential" → encrypt when stored. "Internal" → keep inside the company.</li>
                        <li><strong>Access rules:</strong> Turn on multi‑factor authentication for every account. Only get the access you really need. Never share your password with anyone.</li>
                        <li><strong>AI governance:</strong> Use only approved AI tools. Using unapproved "shadow AI" is forbidden.</li>
                        <li><strong>Security incidents:</strong> If something critical happens, report within 1 hour. If client data is leaked, tell leadership within 2 hours; we will inform regulators within 72 hours if required.</li>
                    </ul>
                    <div class="vendor-note">Our IT partner must be ISO 27001 or SOC2 certified, monitor systems 24/7, and run a hack test every year.</div>
                </div>
            </div>
        `,
        legal: `
            <div>
                <div class="policy-title">Legal & AI Rules</div>
                <div class="policy-id">KNL-LEG-001</div>
                <div class="policy-section-block">
                    <ul>
                        <li><strong>EU AI Act:</strong> We classify AI systems by risk: Unacceptable (banned), High (extra checks needed), Limited, or Minimal risk.</li>
                        <li><strong>NIST AI framework:</strong> We follow four steps: Govern, Map, Measure, Manage.</li>
                        <li><strong>Privacy laws (like GDPR, CTDPA):</strong> If a person asks to see or delete their data, we must respond within 30 days.</li>
                        <li><strong>Contracts:</strong> Never start work without a signed agreement. All work you create belongs to KNEURALABS.</li>
                    </ul>
                    <div class="vendor-note">Our legal partner must be licensed in Connecticut, track new AI laws, give quarterly reports, and have professional insurance.</div>
                </div>
            </div>
        `,
        conduct: `
            <div>
                <div class="policy-title">Workplace Conduct</div>
                <div class="policy-id">KNL-ETH-001</div>
                <div class="policy-section-block">
                    <ul>
                        <li><strong>Ethics:</strong> Always act honestly. Tell your manager if you have a conflict of interest. Do not accept gifts worth more than $50 without approval.</li>
                        <li><strong>Equal opportunity:</strong> We do not discriminate based on race, gender, age, disability, or other protected traits. We provide reasonable accommodations when needed.</li>
                        <li><strong>Anti-bribery:</strong> No bribes, kickbacks, or "facilitation payments" ever. Follow the US Foreign Corrupt Practices Act (FCPA).</li>
                        <li><strong>Reporting violations:</strong> Report any misconduct to our legal partner. We do not tolerate retaliation against anyone who reports in good faith.</li>
                    </ul>
                </div>
            </div>
        `,
        safety: `
            <div>
                <div class="policy-title">Safe Workplace</div>
                <div class="policy-id">KNL-SAFE-001</div>
                <div class="policy-section-block">
                    <ul>
                        <li><strong>Sexual harassment:</strong> Zero tolerance. Unwanted touching, sexual jokes, or offensive comments are forbidden. Report to HR or a manager. We investigate within 15 days.</li>
                        <li><strong>Workplace violence:</strong> No threats, bullying, or physical aggression. Report any incident immediately.</li>
                        <li><strong>Drugs & alcohol:</strong> No illegal drugs. No drinking during work hours unless it's a company-approved event. Never come to work impaired.</li>
                        <li><strong>No retaliation:</strong> If you report a problem in good faith, you are protected.</li>
                    </ul>
                </div>
            </div>
        `,
        workplace: `
            <div>
                <div class="policy-title">Workplace & IT Rules</div>
                <div class="policy-id">KNL-WP-001</div>
                <div class="policy-section-block">
                    <ul>
                        <li><strong>Remote work:</strong> Use a secure home Wi‑Fi, lock your computer when away, and never work with client data in public coffee shops. Follow the same security rules as in the office.</li>
                        <li><strong>Acceptable use:</strong> Company devices are for business. No hacking, no pirated software, no running a side business. You have no expectation of privacy on company devices – we may monitor.</li>
                        <li><strong>Physical security:</strong> Lock office doors, wear your ID badge, and don't let strangers follow you inside. Clean your desk – don't leave sensitive papers out.</li>
                        <li><strong>Records retention:</strong> Keep documents as long as the law requires (e.g., 7 years for financial records). Securely delete them when no longer needed. If we have a legal hold, keep everything.</li>
                    </ul>
                </div>
            </div>
        `,
        privacy: `
            <div>
                <div class="policy-title">Data Privacy</div>
                <div class="policy-id">KNL-DAT-001</div>
                <div class="policy-section-block">
                    <ul>
                        <li><strong>Basic principles:</strong> Collect only what we need, tell people why we collect it, keep data accurate, and protect it with strong security.</li>
                        <li><strong>Your rights:</strong> You can ask to see, correct, or delete your personal data. We must answer within 30 days.</li>
                        <li><strong>Data breach:</strong> Report any possible breach to leadership within 2 hours. We will notify regulators within 72 hours if required by law.</li>
                        <li><strong>Sending data across borders:</strong> Personal data from Europe cannot leave Europe without special safeguards (called SCCs).</li>
                    </ul>
                    <div class="vendor-note">Any vendor that handles personal data must sign a Data Processing Agreement (DPA) with us.</div>
                </div>
            </div>
        `,
        acknowledge: `
            <div>
                <div class="policy-title">Policy Acknowledgment</div>
                <div class="policy-id">KNL-ACK-001</div>
                <div class="policy-section-block">
                    <p>You can confirm you have read and agree to all policies by using the "Acknowledge policies" link at the bottom of the sidebar. That link will open your email app so you can send a confirmation to us.</p>
                    <div class="plain-note">No button is needed here — simply click "Acknowledge policies" in the left menu to send your confirmation.</div>
                    <div class="footnote">Policy version 1.0, effective April 1, 2025. Next review: April 1, 2026.</div>
                </div>
            </div>
        `
    };
    
    let currentPolicy = "overview";
    
    function applySectionColors(policyKey) {
        const mainEl = document.querySelector('.wiki-main');
        if (!mainEl) return;
        const bgColor = sectionColors[policyKey] || "#FFFFFF";
        const textColor = getTextColor(bgColor);
        mainEl.style.backgroundColor = bgColor;
        mainEl.style.color = textColor;
        const notes = mainEl.querySelectorAll('.vendor-note, .plain-note, .footnote');
        notes.forEach(note => {
            note.style.borderTopColor = textColor === '#111111' ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.2)';
            note.style.borderLeftColor = textColor === '#111111' ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)';
        });
    }
    
    function renderWiki() {
        const container = document.getElementById('policyView');
        if (!container) return;
        container.innerHTML = policies[currentPolicy] || policies.overview;
        applySectionColors(currentPolicy);
        document.querySelectorAll('.nav-item').forEach(item => {
            const pol = item.getAttribute('data-policy');
            if (pol === currentPolicy) item.classList.add('active');
            else item.classList.remove('active');
        });
    }
    
    function enableAllNavItems() { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('disabled')); }
    function disableNonMatchingNavItems(matchingKeys) {
        document.querySelectorAll('.nav-item').forEach(item => {
            const pol = item.getAttribute('data-policy');
            if (matchingKeys.includes(pol)) item.classList.remove('disabled');
            else item.classList.add('disabled');
        });
    }
    function filterSearch(query) {
        const q = query.trim().toLowerCase();
        if (q === "") { enableAllNavItems(); currentPolicy = "overview"; renderWiki(); return; }
        let matches = [];
        for (const [key, html] of Object.entries(policies)) {
            const text = html.replace(/<[^>]*>/g, ' ').toLowerCase();
            if (text.includes(q) || key.includes(q)) matches.push(key);
        }
        if (matches.length === 0) { disableNonMatchingNavItems([]); document.getElementById('policyView').innerHTML = `<div class="no-results">No results for "${q}". Clear search to see all policies.</div>`; applySectionColors(currentPolicy); return; }
        disableNonMatchingNavItems(matches);
        currentPolicy = matches[0];
        renderWiki();
        if (matches.length > 1) { const note = document.createElement('div'); note.className = 'footnote'; note.innerText = `${matches.length} policies match. Use sidebar to explore results.`; document.getElementById('policyView').appendChild(note); }
    }
    
    function sendAcknowledgement() {
        const subject = encodeURIComponent("Policy Acknowledgment - KNEURALABS");
        const body = encodeURIComponent("I have read and understood the KNEURALABS policy handbook and agree to comply.\n\nName: [Your name]\nRole: [Your role]\nDate: " + new Date().toLocaleDateString());
        window.location.href = `mailto:hello@kneuralabs.com?subject=${subject}&body=${body}`;
        currentPolicy = "acknowledge";
        renderWiki();
        const searchInput = document.getElementById('sidebarSearch');
        if (searchInput) searchInput.value = '';
        enableAllNavItems();
        if (window.innerWidth <= 780) document.getElementById('sidebar').classList.remove('mobile-open');
    }
    
    // ---------- MAGIC WORD LOGIC (single field: "hello") ----------
    const landingDiv = document.getElementById('landingContainer');
    const wikiAppDiv = document.getElementById('wikiApp');
    const magicInput = document.getElementById('magicWord');
    const magicBtn = document.getElementById('magicBtn');
    const errorSpan = document.getElementById('magicError');
    
    function checkMagicWord() {
        const word = magicInput.value.trim().toLowerCase();
        if (word === "hello") {
            landingDiv.classList.add('hidden');
            wikiAppDiv.classList.add('active');
            renderWiki();
            enableAllNavItems();
            attachWikiEvents();
            // clear error if any
            errorSpan.innerText = "";
        } else {
            errorSpan.innerText = "Wrong magic word";
            magicInput.value = "";
            magicInput.focus();
        }
    }
    
    magicBtn.addEventListener('click', checkMagicWord);
    magicInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkMagicWord(); });
    
    function attachWikiEvents() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.removeEventListener('click', wikiNavHandler);
            item.addEventListener('click', wikiNavHandler);
        });
        function wikiNavHandler(e) {
            if (this.classList.contains('disabled')) return;
            const pol = this.getAttribute('data-policy');
            if (pol) {
                currentPolicy = pol;
                const searchInput = document.getElementById('sidebarSearch');
                if (searchInput) searchInput.value = '';
                enableAllNavItems();
                renderWiki();
                if (window.innerWidth <= 780) document.getElementById('sidebar').classList.remove('mobile-open');
            }
        }
        const searchBtn = document.getElementById('searchSidebarBtn');
        const searchInput = document.getElementById('sidebarSearch');
        const clearBtn = document.getElementById('clearSearch');
        if (searchBtn) searchBtn.onclick = () => filterSearch(searchInput.value);
        if (searchInput) searchInput.onkeyup = (e) => { if (e.key === 'Enter') filterSearch(searchInput.value); };
        if (clearBtn) clearBtn.onclick = () => { if (searchInput) searchInput.value = ''; enableAllNavItems(); filterSearch(''); };
        const ackLink = document.getElementById('sidebarAcknowledgeLink');
        if (ackLink) ackLink.onclick = (e) => { e.preventDefault(); sendAcknowledgement(); };
        const backBtn = document.getElementById('backToTop');
        if (backBtn) backBtn.onclick = () => document.querySelector('.wiki-main').scrollTo({ top: 0, behavior: 'smooth' });
        const toggleBtn = document.getElementById('mobileMenuToggle');
        const sidebar = document.getElementById('sidebar');
        if (toggleBtn) toggleBtn.onclick = () => sidebar.classList.toggle('mobile-open');
    }
</script>
</body>
</html>
