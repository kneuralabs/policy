<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KNEURALABS · Policy Handbook</title>
<meta name="description" content="KNEURALABS internal policy handbook — AI governance, HR, finance, legal, IT security, conduct, and data privacy.">
<meta property="og:title" content="KNEURALABS · Policy Handbook">
<meta property="og:description" content="Internal policy handbook for KNEURALABS. Covers AI governance, HR, finance, legal, IT security, conduct, and data privacy.">
<meta property="og:image" content="og-image.svg">
<meta property="og:type" content="website">
<meta property="og:site_name" content="KNEURALABS">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="KNEURALABS · Policy Handbook">
<meta name="twitter:image" content="og-image.svg">
<link rel="icon" href="LOGO.png" type="image/png">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="landing-container" id="landingContainer">
  <div class="landing-card">
    <img src="LOGO.png" class="kn-mark" alt="Kneuralabs logo">
    <div class="main-title"><span>KNEURALABS</span><br>Policy Handbook</div>
    <div class="version-text">Version 2.0 · Confidential</div>
    <div class="magic-form">
      <input type="text" id="magicWord" class="magic-field" placeholder="magic word" autocomplete="off" spellcheck="false">
      <button type="button" id="magicBtn" class="magic-btn">Enter</button>
      <div class="error-msg" id="magicError"></div>
    </div>
  </div>
</div>
<script>
  var btn = document.getElementById('magicBtn');
  var inp = document.getElementById('magicWord');
  var err = document.getElementById('magicError');

  function shake(el) {
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
    el.addEventListener('animationend', function(){ el.classList.remove('shake'); }, { once: true });
  }

  function check() {
    if (inp.value.trim().toLowerCase() === 'hello') {
      sessionStorage.setItem('knl_auth', '1');
      location.href = 'pages/overview.html';
    } else {
      err.textContent = 'Wrong magic word.';
      shake(inp);
      shake(err);
      inp.value = '';
      inp.focus();
    }
  }

  btn.addEventListener('click', check);
  inp.addEventListener('keypress', function(e){ if (e.key === 'Enter') check(); });
</script>
</body>
</html>
