<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KNEURALABS · Policy Handbook</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="landing-container" id="landingContainer">
  <div class="landing-card">
    <div class="main-title">KNEURALABS<br>Policy Handbook</div>
    <div class="version-text">Version 2.0 · April 2026</div>
    <div class="magic-form">
      <input type="text" id="magicWord" class="magic-field" placeholder="magic word" autocomplete="off" spellcheck="false">
      <button type="button" id="magicBtn" class="magic-btn">Enter</button>
      <div class="error-msg" id="magicError"></div>
    </div>
  </div>
</div>
<script>
  const btn = document.getElementById('magicBtn');
  const inp = document.getElementById('magicWord');
  const err = document.getElementById('magicError');

  function shake(el) {
    el.classList.remove('shake');
    void el.offsetWidth; // force reflow to restart animation
    el.classList.add('shake');
    el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
  }

  function check() {
    if (inp.value.trim().toLowerCase() === 'hello') {
      sessionStorage.setItem('knl_auth', '1');
      location.href = 'pages/overview.html';
    } else {
      err.innerText = 'Wrong magic word';
      shake(inp);
      shake(err);
      inp.value = '';
      inp.focus();
    }
  }

  btn.addEventListener('click', check);
  inp.addEventListener('keypress', e => { if (e.key === 'Enter') check(); });
</script>
</body>
</html>
