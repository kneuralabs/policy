<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="Inter,Arial,sans-serif">
  <!-- Deep Navy background -->
  <rect width="1200" height="630" fill="#0D2E5A"/>
  <!-- Left accent bar -->
  <rect width="6" height="630" fill="#1C5CAA"/>
  <!-- Bottom accent bar -->
  <rect y="600" width="1200" height="30" fill="#1C5CAA"/>
  <!-- Red accent section -->
  <rect y="600" width="300" height="30" fill="#C8281E"/>

  <!-- Logo PNG -->
  <image href="LOGO.png" x="80" y="185" width="260" height="260"/>

  <!-- Brand name -->
  <text x="400" y="285" font-size="72" font-weight="700" letter-spacing="-1" fill="#F7F8FA">KNEURALABS</text>
  <!-- Tagline -->
  <text x="402" y="345" font-size="32" font-weight="400" fill="#D0D2D6">Policy Handbook</text>
  <!-- Divider -->
  <rect x="400" y="375" width="560" height="2" fill="#1C5CAA"/>
  <!-- Standards line -->
  <text x="402" y="420" font-size="22" font-weight="400" fill="#6B7280">NIST AI RMF · ISO/IEC 42001:2023 · EU AI Act</text>
  <!-- Version -->
  <text x="402" y="462" font-size="20" font-weight="400" fill="#4A8BC8">Version 2.0 · Confidential</text>

  <!-- Corner domain -->
  <text x="1120" y="590" font-size="18" font-weight="400" fill="#4A8BC8" text-anchor="end">policy.kneuralabs.com</text>
</svg>
